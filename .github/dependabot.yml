---
version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      github-actions:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "ci(deps)"
  - package-ecosystem: docker
    directories:
      - .devcontainer/cpp
      - .devcontainer/rust
    schedule:
      interval: monthly
  - package-ecosystem: devcontainers
    directory: /
    schedule:
      interval: monthly
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    groups:
      npm:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "test(deps)"
  - package-ecosystem: pip
    directory: .devcontainer
    schedule:
      interval: monthly
