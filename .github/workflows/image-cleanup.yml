---
name: Cleanup Images

on:
  schedule:
    - cron: "0 0 * * 3"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  cleanup-images:
    name: 🧹 Clean Images
    runs-on: ubuntu-latest
    permissions:
      packages: write # is needed by dataaxiom/ghcr-cleanup-action to delete untagged and orphaned images
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          allowed-endpoints: >
            api.github.com:443
            ghcr.io:443
      - uses: dataaxiom/ghcr-cleanup-action@f092b48ba3b604b2a83690dc4b2bbb3392e1045f # v1.2.1
        with:
          delete-orphaned-images: true
          delete-untagged: true
          packages: embedded-devcontainer,embedded-devcontainer-cpp,embedded-devcontainer-rust
